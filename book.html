<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Book a Letter — Lade Writes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      :root {
        --brown: #3b1a08;
        --brown-2: #5c2e10;
        --brown-3: #8a4f2a;
        --brown-4: #b8845a;
        --sand: #e8d5ba;
        --sand-2: #f2e6d4;
        --sand-3: #faf5ee;
        --cream: #fffcf7;
        --gold: #c4923a;
        --gold-2: #e8b86d;
        --ink: #1c0d04;
        --soft-bg: #f5ede3;
        --f-display: "Playfair Display", serif;
        --f-body: "Tahoma", "Segoe UI", "Outfit", sans-serif;
        --f-ui: "Outfit", "Segoe UI", sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: linear-gradient(
          135deg,
          var(--sand-3) 0%,
          var(--sand-2) 100%
        );
        font-family: var(--f-body);
        min-height: 100vh;
        padding: 2rem 1.5rem;
      }

      /* Simple header */
      .booking-header {
        text-align: center;
        margin-bottom: 2.5rem;
      }
      .booking-header a {
        display: inline-block;
        margin-bottom: 1.5rem;
        font-family: var(--f-ui);
        font-size: 0.7rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--brown-3);
        text-decoration: none;
        transition: color 0.2s;
      }
      .booking-header a:hover {
        color: var(--brown);
      }
      .booking-header h1 {
        font-family: var(--f-display);
        font-size: clamp(2rem, 5vw, 2.8rem);
        font-weight: 800;
        color: var(--brown);
        margin-bottom: 0.5rem;
      }
      .booking-header p {
        font-family: var(--f-body);
        font-size: 0.95rem;
        color: var(--brown-2);
      }

      /* Modal-style card */
      .booking-card {
        max-width: 620px;
        margin: 0 auto;
        background: var(--cream);
        padding: 2.5rem;
        border-radius: 24px;
        box-shadow: 0 20px 48px rgba(59, 26, 8, 0.12);
        border: 1px solid var(--sand);
      }
      .m-pill {
        background: var(--sand-2);
        padding: 0.85rem 1.2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.8rem;
        font-family: var(--f-ui);
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        color: var(--brown-2);
        border-radius: 12px;
      }
      .m-pill strong {
        color: var(--brown);
      }
      .m-price {
        background: var(--gold);
        color: var(--brown);
        font-weight: 700;
        padding: 0.3rem 0.8rem;
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        border-radius: 20px;
      }
      .fg {
        margin-bottom: 1.2rem;
      }
      .fg label {
        display: block;
        font-family: var(--f-ui);
        font-size: 0.65rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--brown-3);
        margin-bottom: 0.4rem;
        font-weight: 600;
      }
      .fg input,
      .fg textarea,
      .fg select {
        width: 100%;
        background: var(--sand-3);
        border: 1.5px solid var(--sand);
        padding: 0.75rem 1rem;
        font-family: var(--f-body);
        font-size: 0.95rem;
        color: var(--brown);
        outline: none;
        transition: border-color 0.2s;
        resize: vertical;
        border-radius: 8px;
      }
      .fg input:focus,
      .fg textarea:focus,
      .fg select:focus {
        border-color: var(--brown-2);
      }
      .fg textarea {
        min-height: 90px;
      }
      .fg-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .m-submit {
        width: 100%;
        background: var(--gold);
        color: var(--brown);
        font-weight: 700;
        border: none;
        padding: 1rem;
        font-family: var(--f-ui);
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        margin-top: 0.8rem;
        transition: background 0.2s;
        border-radius: 40px;
      }
      .m-submit:hover {
        background: var(--brown-2);
        color: var(--sand-3);
      }
      .m-note {
        text-align: center;
        font-family: var(--f-body);
        font-size: 0.8rem;
        color: var(--brown-3);
        margin-top: 1rem;
      }
      .required-star {
        color: var(--gold);
        margin-left: 2px;
      }

      @media (max-width: 550px) {
        body {
          padding: 1.5rem 1rem;
        }
        .booking-card {
          padding: 1.8rem;
        }
        .fg-row {
          grid-template-columns: 1fr;
          gap: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="booking-header">
      <a href="index.html">← Back to Home</a>
      <h1>Book a Letter</h1>
      <p>Fill in the details below and I'll reach out shortly ✦</p>
    </div>

    <div class="booking-card">
      <div class="m-pill" id="mPill" style="display: none">
        <span>Selected: <strong id="mName"></strong></span>
        <span class="m-price" id="mPrice"></span>
      </div>

      <div class="fg">
        <label>Choose offering <span class="required-star">*</span></label>
        <select id="fOffering">
          <option value="">Select…</option>
          <option value="Single Letter — ₦5,000">Single Letter — ₦5,000</option>
          <option value="Letter Polaroid — ₦7,000">
            Letter Polaroid — ₦7,000
          </option>
          <option value="Polaroid Pocket — ₦2,000">
            Polaroid Pocket — ₦2,000
          </option>
          <option value="Scroll Letter — ₦4,000">Scroll Letter — ₦4,000</option>
        </select>
      </div>

      <div class="fg">
        <label>Your Name <span class="required-star">*</span></label>
        <input type="text" id="fName" placeholder="e.g. Amara Okafor" />
      </div>

      <div class="fg-row">
        <div class="fg">
          <label>WhatsApp Number <span class="required-star">*</span></label>
          <input
            type="tel"
            id="fPhone"
            placeholder="0800 000 0000"
          />
        </div>
        <div class="fg">
          <label>Instagram (optional)</label>
          <input type="text" id="fInsta" placeholder="@username" />
        </div>
      </div>

      <div class="fg">
        <label>Who is the letter for?</label>
        <input
          type="text"
          id="fRecipient"
          placeholder="e.g. My mum, Tunde, Best friend…"
        />
      </div>

      <div class="fg">
        <label>Occasion</label>
        <select id="fOccasion">
          <option value="">Select…</option>
          <option>Birthday</option>
          <option>Anniversary</option>
          <option>Graduation</option>
          <option>Apology</option>
          <option>Wedding / Proposal</option>
          <option>Just because</option>
          <option>Other</option>
        </select>
      </div>

      <div class="fg">
        <label>Give me the vibes</label>
        <textarea
          id="fVibe"
          placeholder="Tell me about the person, the tone you want — happy, emotional, romantic, funny… anything helps!"
        ></textarea>
      </div>

      <div class="fg">
        <label>Deadline (if any)</label>
        <input type="text" id="fDeadline" placeholder="e.g. Before Dec 25th" />
      </div>

      <div class="fg">
        <label>Anything else?</label>
        <textarea
          id="fExtra"
          placeholder="Special requests, add-ons, questions…"
          style="min-height: 65px"
        ></textarea>
      </div>

      <button class="m-submit" onclick="sendWA()">
        <i class="fab fa-whatsapp"></i> Send to Lade's WhatsApp
      </button>
      <p class="m-note">You'll be taken to WhatsApp to confirm your booking</p>
    </div>

    <script>
      // Get URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const offeringParam = urlParams.get("offering");
      const priceParam = urlParams.get("price");

      // Auto-fill offering from URL if present
      if (offeringParam && priceParam) {
        const fullOffering = offeringParam + " — " + priceParam;
        const selectEl = document.getElementById("fOffering");
        for (let i = 0; i < selectEl.options.length; i++) {
          if (selectEl.options[i].value === fullOffering) {
            selectEl.selectedIndex = i;
            break;
          }
        }
        // Show pill
        document.getElementById("mName").textContent = offeringParam;
        document.getElementById("mPrice").textContent = priceParam;
        document.getElementById("mPill").style.display = "flex";
      }

      function sendWA() {
        const name = document.getElementById("fName").value.trim();
        const phone = document.getElementById("fPhone").value.trim();
        const offering = document.getElementById("fOffering").value;
        const recipient = document.getElementById("fRecipient").value.trim();
        const occasion = document.getElementById("fOccasion").value;
        const vibe = document.getElementById("fVibe").value.trim();
        const deadline = document.getElementById("fDeadline").value.trim();
        const insta = document.getElementById("fInsta").value.trim();
        const extra = document.getElementById("fExtra").value.trim();

        if (!name || !phone) {
          alert("Please fill in your name and WhatsApp number ✦");
          return;
        }

        const msg = [
          "✉️ *New Booking — Lade Writes*",
          "",
          "*Offering:* " + (offering || "Not selected"),
          "",
          "*Client:* " + name,
          "*Phone/WhatsApp:* " + phone,
          insta ? "*Instagram:* " + insta : null,
          "",
          "*Letter for:* " + (recipient || "Not specified"),
          "*Occasion:* " + (occasion || "Not specified"),
          "",
          "*Vibes / Direction:*",
          vibe || "Not specified",
          "",
          deadline ? "*Deadline:* " + deadline : null,
          extra ? "*Extra Notes:*\n" + extra : null,
          "",
          "_via ladewrites.com_",
        ]
          .filter(Boolean)
          .join("\n");

        const waNum = "2347084291183";
        window.open(
          "https://wa.me/" + waNum + "?text=" + encodeURIComponent(msg),
          "_blank",
        );
      }
    </script>
  </body>
</html>
